name: Build OLLVM NDK r26d - Maximum Protection

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      # ============================================
      # STEP 1: Checkout LLVM 17.0.6 official
      # ============================================
      - name: Checkout LLVM 17.0.6
        uses: actions/checkout@v4
        with:
          repository: llvm/llvm-project
          ref: llvmorg-17.0.6
          path: llvm-project

      # ============================================
      # STEP 2: Create OLLVM passes
      # ============================================
      - name: Create OLLVM obfuscation passes
        run: |
          cd llvm-project
          
          mkdir -p llvm/lib/Transforms/Obfuscation
          mkdir -p llvm/include/llvm/Transforms/Obfuscation
          
          # ==========================================
          # BogusControlFlow.h
          # ==========================================
          cat > llvm/include/llvm/Transforms/Obfuscation/BogusControlFlow.h << 'HEADER'
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_BOGUSCONTROLFLOW_H
          #define LLVM_TRANSFORMS_OBFUSCATION_BOGUSCONTROLFLOW_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class BogusControlFlow : public PassInfoMixin<BogusControlFlow> {
          public:
            PreservedAnalyses run(Function &F, FunctionAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          HEADER
          
          # ==========================================
          # BogusControlFlow.cpp
          # ==========================================
          cat > llvm/lib/Transforms/Obfuscation/BogusControlFlow.cpp << 'CPP'
          #include "llvm/Transforms/Obfuscation/BogusControlFlow.h"
          #include "llvm/IR/IRBuilder.h"
          #include "llvm/IR/Instructions.h"
          #include "llvm/Support/CommandLine.h"
          #include "llvm/Support/RandomNumberGenerator.h"
          #include <random>
          
          using namespace llvm;
          
          static cl::opt<int> BCFProb("bcf_prob", cl::init(90), cl::desc("BCF probability (0-100)"));
          static cl::opt<int> BCFLoop("bcf_loop", cl::init(3), cl::desc("BCF number of loops"));
          
          PreservedAnalyses BogusControlFlow::run(Function &F, FunctionAnalysisManager &AM) {
              if (F.isDeclaration() || F.empty())
                  return PreservedAnalyses::all();
              
              std::random_device rd;
              std::mt19937 gen(rd());
              std::uniform_int_distribution<> dist(0, 100);
              
              std::vector<BasicBlock*> blocks;
              for (BasicBlock &BB : F) {
                  if (!BB.isEntryBlock())
                      blocks.push_back(&BB);
              }
              
              for (BasicBlock *BB : blocks) {
                  if (dist(gen) > BCFProb)
                      continue;
                  
                  for (int i = 0; i < BCFLoop; i++) {
                      BasicBlock *BogusBB = BasicBlock::Create(F.getContext(), "bcf_block", &F);
                      IRBuilder<> BogusBuilder(BogusBB);
                      
                      Value *R1 = BogusBuilder.getInt32(rand() % 1000);
                      Value *R2 = BogusBuilder.getInt32(rand() % 1000);
                      Value *Junk1 = BogusBuilder.CreateAdd(R1, R2, "junk_add");
                      Value *Junk2 = BogusBuilder.CreateMul(Junk1, R1, "junk_mul");
                      Value *Junk3 = BogusBuilder.CreateXor(Junk2, R2, "junk_xor");
                      
                      Value *X = BogusBuilder.getInt32(0x55555555);
                      Value *Y = BogusBuilder.getInt32(0xAAAAAAAA);
                      Value *Z = BogusBuilder.CreateOr(X, Y, "pred_or");
                      Value *W = BogusBuilder.getInt32(0xFFFFFFFF);
                      Value *Pred = BogusBuilder.CreateICmpEQ(Z, W, "pred_cmp");
                      
                      BogusBuilder.CreateCondBr(Pred, BB, BogusBB);
                  }
              }
              return PreservedAnalyses::none();
          }
          CPP
          
          # ==========================================
          # Flattening.h
          # ==========================================
          cat > llvm/include/llvm/Transforms/Obfuscation/Flattening.h << 'HEADER'
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_FLATTENING_H
          #define LLVM_TRANSFORMS_OBFUSCATION_FLATTENING_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class Flattening : public PassInfoMixin<Flattening> {
          public:
            PreservedAnalyses run(Function &F, FunctionAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          HEADER
          
          # ==========================================
          # Flattening.cpp
          # ==========================================
          cat > llvm/lib/Transforms/Obfuscation/Flattening.cpp << 'CPP'
          #include "llvm/Transforms/Obfuscation/Flattening.h"
          #include "llvm/IR/IRBuilder.h"
          #include "llvm/IR/Instructions.h"
          #include "llvm/Support/CommandLine.h"
          #include <random>
          
          using namespace llvm;
          
          static cl::opt<int> FLAProb("fla_prob", cl::init(100), cl::desc("FLA probability (0-100)"));
          
          PreservedAnalyses Flattening::run(Function &F, FunctionAnalysisManager &AM) {
              if (F.isDeclaration() || F.size() <= 2)
                  return PreservedAnalyses::all();
              
              std::random_device rd;
              std::mt19937 gen(rd());
              std::uniform_int_distribution<> dist(0, 100);
              
              if (dist(gen) > FLAProb)
                  return PreservedAnalyses::all();
              
              BasicBlock *Entry = &F.getEntryBlock();
              BasicBlock *Dispatcher = BasicBlock::Create(F.getContext(), "fla_dispatch", &F);
              
              IRBuilder<> Builder(Dispatcher);
              AllocaInst *SwitchVar = Builder.CreateAlloca(Builder.getInt32Ty(), nullptr, "fla_switch");
              Builder.CreateStore(Builder.getInt32(0), SwitchVar);
              
              std::vector<BasicBlock*> blocks;
              for (BasicBlock &BB : F) {
                  if (&BB != Entry && &BB != Dispatcher)
                      blocks.push_back(&BB);
              }
              
              LoadInst *LoadVar = Builder.CreateLoad(Builder.getInt32Ty(), SwitchVar, "fla_load");
              SwitchInst *Sw = Builder.CreateSwitch(LoadVar, Dispatcher, blocks.size());
              
              int idx = 1;
              for (BasicBlock *BB : blocks) {
                  Sw->addCase(Builder.getInt32(idx), BB);
                  
                  IRBuilder<> BBBuilder(BB);
                  if (BB->getTerminator()) {
                      BBBuilder.SetInsertPoint(BB->getTerminator());
                      BB->getTerminator()->eraseFromParent();
                  }
                  
                  int nextIdx = (idx % blocks.size()) + 1;
                  BBBuilder.CreateStore(Builder.getInt32(nextIdx), SwitchVar);
                  BBBuilder.CreateBr(Dispatcher);
                  idx++;
              }
              
              Entry->getTerminator()->eraseFromParent();
              IRBuilder<> EntryBuilder(Entry);
              EntryBuilder.CreateStore(Builder.getInt32(1), SwitchVar);
              EntryBuilder.CreateBr(Dispatcher);
              
              return PreservedAnalyses::none();
          }
          CPP
          
          # ==========================================
          # Substitution.h
          # ==========================================
          cat > llvm/include/llvm/Transforms/Obfuscation/Substitution.h << 'HEADER'
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_SUBSTITUTION_H
          #define LLVM_TRANSFORMS_OBFUSCATION_SUBSTITUTION_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class Substitution : public PassInfoMixin<Substitution> {
          public:
            PreservedAnalyses run(Function &F, FunctionAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          HEADER
          
          # ==========================================
          # Substitution.cpp
          # ==========================================
          cat > llvm/lib/Transforms/Obfuscation/Substitution.cpp << 'CPP'
          #include "llvm/Transforms/Obfuscation/Substitution.h"
          #include "llvm/IR/IRBuilder.h"
          #include "llvm/IR/Instructions.h"
          #include "llvm/Support/CommandLine.h"
          
          using namespace llvm;
          
          static cl::opt<int> SubLoop("sub_loop", cl::init(5), cl::desc("SUB number of loops"));
          
          PreservedAnalyses Substitution::run(Function &F, FunctionAnalysisManager &AM) {
              if (F.isDeclaration())
                  return PreservedAnalyses::all();
              
              for (int iter = 0; iter < SubLoop; iter++) {
                  for (BasicBlock &BB : F) {
                      std::vector<BinaryOperator*> toReplace;
                      for (Instruction &I : BB) {
                          if (BinaryOperator *BO = dyn_cast<BinaryOperator>(&I)) {
                              toReplace.push_back(BO);
                          }
                      }
                      
                      for (BinaryOperator *BO : toReplace) {
                          IRBuilder<> Builder(BO);
                          
                          if (BO->getOpcode() == Instruction::Add) {
                              Value *Neg = Builder.CreateNeg(BO->getOperand(1));
                              Value *Sub = Builder.CreateSub(BO->getOperand(0), Neg);
                              BO->replaceAllUsesWith(Sub);
                          }
                          else if (BO->getOpcode() == Instruction::Sub) {
                              Value *Neg = Builder.CreateNeg(BO->getOperand(1));
                              Value *Add = Builder.CreateAdd(BO->getOperand(0), Neg);
                              BO->replaceAllUsesWith(Add);
                          }
                          else if (BO->getOpcode() == Instruction::And) {
                              Value *NotA = Builder.CreateNot(BO->getOperand(0));
                              Value *NotB = Builder.CreateNot(BO->getOperand(1));
                              Value *Or = Builder.CreateOr(NotA, NotB);
                              Value *Not = Builder.CreateNot(Or);
                              BO->replaceAllUsesWith(Not);
                          }
                          else if (BO->getOpcode() == Instruction::Or) {
                              Value *NotA = Builder.CreateNot(BO->getOperand(0));
                              Value *NotB = Builder.CreateNot(BO->getOperand(1));
                              Value *And = Builder.CreateAnd(NotA, NotB);
                              Value *Not = Builder.CreateNot(And);
                              BO->replaceAllUsesWith(Not);
                          }
                          else if (BO->getOpcode() == Instruction::Xor) {
                              Value *NotA = Builder.CreateNot(BO->getOperand(0));
                              Value *NotB = Builder.CreateNot(BO->getOperand(1));
                              Value *And1 = Builder.CreateAnd(NotA, BO->getOperand(1));
                              Value *And2 = Builder.CreateAnd(BO->getOperand(0), NotB);
                              Value *Or = Builder.CreateOr(And1, And2);
                              BO->replaceAllUsesWith(Or);
                          }
                      }
                  }
              }
              return PreservedAnalyses::none();
          }
          CPP
          
          # ==========================================
          # StringObfuscation.h
          # ==========================================
          cat > llvm/include/llvm/Transforms/Obfuscation/StringObfuscation.h << 'HEADER'
          #ifndef LLVM_TRANSFORMS_OBFUSCATION_STRINGOBFUSCATION_H
          #define LLVM_TRANSFORMS_OBFUSCATION_STRINGOBFUSCATION_H
          #include "llvm/IR/PassManager.h"
          namespace llvm {
          class StringObfuscation : public PassInfoMixin<StringObfuscation> {
          public:
            PreservedAnalyses run(Module &M, ModuleAnalysisManager &AM);
            static bool isRequired() { return true; }
          };
          }
          #endif
          HEADER
          
          # ==========================================
          # StringObfuscation.cpp
          # ==========================================
          cat > llvm/lib/Transforms/Obfuscation/StringObfuscation.cpp << 'CPP'
          #include "llvm/Transforms/Obfuscation/StringObfuscation.h"
          #include "llvm/IR/Constants.h"
          #include "llvm/IR/GlobalVariable.h"
          #include "llvm/IR/Module.h"
          #include <random>
          
          using namespace llvm;
          
          PreservedAnalyses StringObfuscation::run(Module &M, ModuleAnalysisManager &AM) {
              std::random_device rd;
              std::mt19937 gen(rd());
              std::uniform_int_distribution<> keyDist(1, 255);
              
              for (GlobalVariable &GV : M.globals()) {
                  if (!GV.hasInitializer())
                      continue;
                  if (!GV.getInitializer()->getType()->isArrayTy())
                      continue;
                  
                  ConstantDataArray *CDA = dyn_cast<ConstantDataArray>(GV.getInitializer());
                  if (!CDA || !CDA->isString())
                      continue;
                  
                  StringRef Str = CDA->getAsString();
                  if (Str.empty())
                      continue;
                  
                  uint8_t Key = keyDist(gen);
                  std::string Encrypted(Str.size(), '\0');
                  for (size_t i = 0; i < Str.size(); i++) {
                      Encrypted[i] = Str[i] ^ Key;
                  }
                  
                  GV.setInitializer(ConstantDataArray::getString(M.getContext(), Encrypted));
              }
              return PreservedAnalyses::none();
          }
          CPP
          
          echo "✅ All OLLVM passes created"

      # ============================================
      # STEP 3: Register passes in LLVM
      # ============================================
      - name: Register OLLVM passes in build system
        run: |
          cd llvm-project
          
          cat > llvm/lib/Transforms/Obfuscation/CMakeLists.txt << 'CMAKE'
          add_llvm_component_library(LLVMObfuscation
            BogusControlFlow.cpp
            Flattening.cpp
            Substitution.cpp
            StringObfuscation.cpp
          
            LINK_COMPONENTS
            Core
            Support
            TransformUtils
          )
          CMAKE
          
          if ! grep -q "add_subdirectory(Obfuscation)" llvm/lib/Transforms/CMakeLists.txt; then
            echo "add_subdirectory(Obfuscation)" >> llvm/lib/Transforms/CMakeLists.txt
          fi
          
          if ! grep -q "LLVMObfuscation" llvm/lib/Passes/CMakeLists.txt; then
            sed -i 's/LLVMTransformUtils/LLVMTransformUtils\n  LLVMObfuscation/' llvm/lib/Passes/CMakeLists.txt
          fi
          
          PASSBUILDER="llvm/lib/Passes/PassBuilder.cpp"
          
          if ! grep -q "BogusControlFlow.h" "$PASSBUILDER"; then
            sed -i '/#include "llvm\/Transforms\/Scalar\/LICM.h"/a\
          #include "llvm/Transforms/Obfuscation/BogusControlFlow.h"\
          #include "llvm/Transforms/Obfuscation/Flattening.h"\
          #include "llvm/Transforms/Obfuscation/Substitution.h"\
          #include "llvm/Transforms/Obfuscation/StringObfuscation.h"' "$PASSBUILDER"
          fi
          
          if ! grep -q '"bcf"' "$PASSBUILDER"; then
            sed -i '/FUNCTION_PASS("loop-unroll", LoopUnrollPass())/a\
            \ \ FUNCTION_PASS("bcf", BogusControlFlow())\
            \ \ FUNCTION_PASS("fla", Flattening())\
            \ \ FUNCTION_PASS("sub", Substitution())' "$PASSBUILDER"
          fi
          
          if ! grep -q '"str-obf"' "$PASSBUILDER"; then
            sed -i '/MODULE_PASS("verify", VerifierPass())/a\
            \ \ MODULE_PASS("str-obf", StringObfuscation())' "$PASSBUILDER"
          fi
          
          echo "✅ Passes registered in PassBuilder.cpp"

      # ============================================
      # STEP 4: Cache LLVM build
      # ============================================
      - name: Cache LLVM build
        uses: actions/cache@v4
        with:
          path: llvm-project/build
          key: ${{ runner.os }}-ollvm-v5-${{ hashFiles('llvm-project/llvm/CMakeLists.txt', 'llvm-project/llvm/lib/Passes/PassBuilder.cpp') }}
          restore-keys: |
            ${{ runner.os }}-ollvm-v5-

      # ============================================
      # STEP 5: Install dependencies
      # ============================================
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake python3
          echo "✅ Build tools installed"

      # ============================================
      # STEP 6: Configure build
      # ============================================
      - name: Configure OLLVM build
        run: |
          mkdir -p llvm-project/build
          cd llvm-project/build
          
          cmake -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DLLVM_ENABLE_PROJECTS="clang;lld" \
            -DLLVM_TARGETS_TO_BUILD="AArch64;ARM;X86" \
            -DLLVM_ENABLE_ASSERTIONS=OFF \
            -DLLVM_ENABLE_TERMINFO=OFF \
            -DLLVM_ENABLE_ZLIB=OFF \
            -DLLVM_ENABLE_ZSTD=OFF \
            -DLLVM_INCLUDE_TESTS=OFF \
            -DLLVM_INCLUDE_EXAMPLES=OFF \
            -DLLVM_INCLUDE_BENCHMARKS=OFF \
            -DLLVM_INCLUDE_DOCS=OFF \
            -DLLVM_BUILD_TESTS=OFF \
            -DLLVM_BUILD_EXAMPLES=OFF \
            -DLLVM_BUILD_TOOLS=ON \
            -DLLVM_USE_LINKER=gold \
            -DCMAKE_C_FLAGS="-O3" \
            -DCMAKE_CXX_FLAGS="-O3" \
            -DLLVM_PARALLEL_COMPILE_JOBS=4 \
            -DLLVM_PARALLEL_LINK_JOBS=2 \
            ../llvm
          
          echo "✅ CMake configuration complete"

      # ============================================
      # STEP 7: Build OLLVM
      # ============================================
      - name: Build OLLVM
        timeout-minutes: 180
        run: |
          cd llvm-project/build
          
          echo "========================================="
          echo "System Info:"
          echo "CPU: $(nproc) cores"
          echo "Memory: $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk: $(df -h . | tail -1 | awk '{print $4}') available"
          echo "========================================="
          
          JOBS=$(nproc)
          if [ $JOBS -gt 4 ]; then
            JOBS=4
          fi
          
          echo "Building with $JOBS parallel jobs..."
          echo "This will take 30-60 minutes..."
          echo "========================================="
          
          ninja -j $JOBS clang lld 2>&1 | tee build.log
          
          echo "========================================="
          echo "Checking build result..."
          
          if [ ! -f bin/clang ]; then
            echo "❌ ERROR: clang binary not found!"
            echo "Build log last 50 lines:"
            tail -50 build.log
            exit 1
          fi
          
          if grep -i "error:" build.log > /dev/null 2>&1; then
            echo "❌ Build errors found:"
            grep -i "error:" build.log | head -20
            exit 1
          fi
          
          echo "✅ OLLVM built successfully!"
          ./bin/clang --version

      # ============================================
      # STEP 8: Download NDK r26d
      # ============================================
      - name: Download Android NDK r26d
        run: |
          echo "Downloading NDK r26d..."
          curl -L --retry 5 --retry-delay 10 \
            -o android-ndk-r26d-linux.zip \
            https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
          
          if [ ! -f android-ndk-r26d-linux.zip ]; then
            echo "❌ NDK download failed!"
            exit 1
          fi
          
          unzip -q android-ndk-r26d-linux.zip -d ndk
          echo "✅ NDK downloaded"
          ls -la ndk/android-ndk-r26d/

      # ============================================
      # STEP 9: Integrate OLLVM into NDK
      # ============================================
      - name: Integrate OLLVM into NDK
        run: |
          BIN_DIR="ndk/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin"
          BUILD_BIN="llvm-project/build/bin"
          
          echo "Backing up original clang..."
          cp "$BIN_DIR/clang" "$BIN_DIR/clang.original"
          cp "$BIN_DIR/clang++" "$BIN_DIR/clang++.original"
          
          echo "Installing OLLVM clang..."
          cp -f "$BUILD_BIN/clang" "$BIN_DIR/clang"
          cp -f "$BUILD_BIN/clang++" "$BIN_DIR/clang++"
          
          cd "$BIN_DIR"
          
          rm -f clang-17 clang++-17
          ln -sf clang clang-17
          ln -sf clang++ clang++-17
          
          echo "✅ OLLVM integrated into NDK"
          
          echo "Verifying..."
          ./clang --version 2>&1 | head -3
          echo 'int main(){return 0;}' | ./clang -x c - -c -o /dev/null && echo "✓ Basic compilation works" || echo "✗ Compilation failed"

      # ============================================
      # STEP 10: Test all flags
      # ============================================
      - name: Test obfuscation flags
        run: |
          BIN="ndk/android-ndk-r26d/toolchains/llvm/prebuilt/linux-x86_64/bin/clang"
          
          cat > test.c << 'EOF'
          #include <string.h>
          int verify(const char* k) {
              int h = 0;
              for(int i = 0; k[i]; i++) h = (h<<5) + k[i];
              return h == 0x1234;
          }
          int main() { return verify("test"); }
          EOF
          
          echo "========================================="
          echo "Testing all OLLVM flags..."
          echo "========================================="
          
          echo -n "BCF:  "
          $BIN -target aarch64-linux-android21 -mllvm -bcf -mllvm -bcf_prob=90 -O2 -c test.c -o /dev/null 2>&1 && echo "✓ Working" || echo "✗ Failed"
          
          echo -n "FLA:  "
          $BIN -target aarch64-linux-android21 -mllvm -fla -O2 -c test.c -o /dev/null 2>&1 && echo "✓ Working" || echo "✗ Failed"
          
          echo -n "SUB:  "
          $BIN -target aarch64-linux-android21 -mllvm -sub -mllvm -sub_loop=5 -O2 -c test.c -o /dev/null 2>&1 && echo "✓ Working" || echo "✗ Failed"
          
          echo -n "SOBF: "
          $BIN -target aarch64-linux-android21 -mllvm -str-obf -O2 -c test.c -o /dev/null 2>&1 && echo "✓ Working" || echo "✗ Failed"
          
          echo -n "ALL:  "
          $BIN -target aarch64-linux-android21 \
            -mllvm -bcf -mllvm -bcf_loop=3 -mllvm -bcf_prob=90 \
            -mllvm -fla \
            -mllvm -sub -mllvm -sub_loop=5 \
            -mllvm -str-obf \
            -O2 -c test.c -o /dev/null 2>&1 && echo "✓ Working" || echo "✗ Failed"
          
          echo "========================================="
          echo "✅ Flag testing complete"
          echo "========================================="

      # ============================================
      # STEP 11: Create build templates
      # ============================================
      - name: Create build templates
        run: |
          mkdir -p ndk/templates
          
          cat > ndk/templates/CMakeLists.txt << 'CMAKE'
          cmake_minimum_required(VERSION 3.22.1)
          project("protected_app")

          set(OLLVM_FLAGS
              -mllvm -bcf
              -mllvm -bcf_loop=3
              -mllvm -bcf_prob=90
              -mllvm -fla
              -mllvm -sub
              -mllvm -sub_loop=5
              -mllvm -str-obf
              -fno-inline
              -fvisibility=hidden
              -fno-stack-protector
              -fomit-frame-pointer
          )

          add_library(native-lib SHARED native-lib.cpp)
          target_compile_options(native-lib PRIVATE ${OLLVM_FLAGS})
          target_link_options(native-lib PRIVATE 
              -Wl,--strip-all
              -Wl,-z,now
              -Wl,-z,relro
              -Wl,--gc-sections
          )
          target_link_libraries(native-lib log android)
          CMAKE
          
          cat > ndk/templates/Android.mk << 'MK'
          LOCAL_PATH := $(call my-dir)
          include $(CLEAR_VARS)
          LOCAL_MODULE := native-lib
          LOCAL_SRC_FILES := native-lib.cpp
          LOCAL_CFLAGS += -mllvm -bcf -mllvm -bcf_loop=3 -mllvm -bcf_prob=90
          LOCAL_CFLAGS += -mllvm -fla -mllvm -sub -mllvm -sub_loop=5 -mllvm -str-obf
          LOCAL_CFLAGS += -fno-inline -fvisibility=hidden -fno-stack-protector
          LOCAL_LDFLAGS += -Wl,--strip-all -Wl,-z,now -Wl,-z,relro
          LOCAL_LDLIBS := -llog -landroid
          include $(BUILD_SHARED_LIBRARY)
          MK
          
          cat > ndk/templates/build_protected.bat << 'BAT'
          @echo off
          echo ==========================================
          echo OLLVM MAXIMUM PROTECTION BUILD
          echo ==========================================
          set NDK_PATH=%~dp0..\
          rmdir /s /q obj libs 2>nul
          for %%A in (arm64-v8a armeabi-v7a x86_64) do (
              echo.
              echo Building %%A...
              %NDK_PATH%\ndk-build.cmd NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI=%%A APP_PLATFORM=android-21 -j%NUMBER_OF_PROCESSORS%
              if errorlevel 1 (
                  echo BUILD FAILED!
                  exit /b 1
              )
          )
          echo.
          echo ==========================================
          echo BUILD COMPLETE
          echo ==========================================
          pause
          BAT
          
          cat > ndk/templates/build_protected.sh << 'SH'
          #!/bin/bash
          set -e
          echo "========================================="
          echo "OLLVM MAXIMUM PROTECTION BUILD"
          echo "========================================="
          NDK_PATH="$(dirname "$0")/.."
          rm -rf obj libs
          for ABI in arm64-v8a armeabi-v7a x86_64; do
              echo ""
              echo "Building $ABI..."
              "$NDK_PATH/ndk-build" NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=Android.mk APP_ABI=$ABI APP_PLATFORM=android-21 -j$(nproc)
          done
          echo ""
          echo "========================================="
          echo "BUILD COMPLETE"
          echo "========================================="
          SH
          chmod +x ndk/templates/build_protected.sh
          
          echo "✅ Build templates created"

      # ============================================
      # STEP 12: Package NDK
      # ============================================
      - name: Package OLLVM NDK
        run: |
          cd ndk
          zip -r ../android-ndk-r26d-ollvm.zip android-ndk-r26d
          cd ..
          echo "========================================="
          echo "Package created:"
          ls -lh android-ndk-r26d-ollvm.zip
          echo "========================================="

      # ============================================
