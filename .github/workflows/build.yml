name: Build Burri Protect

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            cmake \
            git \
            zip \
            unzip \
            python3

      - name: Install Android NDK r26c
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r26c-linux.zip
          unzip -q android-ndk-r26c-linux.zip
          mv android-ndk-r26c $HOME/android-ndk-r26c

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_HOME=$HOME/android-ndk-r26c" >> $GITHUB_ENV
          echo "$HOME/android-ndk-r26c/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          else
            echo "build.sh not found; skipping build step."
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: burri_protect
          path: |
            **/*.so
            **/*.a
            **/*.bin
            **/build/**
